# app.yaml — Databricks App configuration
#
# Databricks Apps automatically injects:
#   PORT=8000, STREAMLIT_SERVER_PORT=8000, STREAMLIT_SERVER_HEADLESS=true,
#   STREAMLIT_SERVER_ENABLE_CORS=false, DATABRICKS_HOST, DATABRICKS_CLIENT_ID,
#   DATABRICKS_CLIENT_SECRET
#
# We only need to pass the SQL Warehouse HTTP path.
# DO NOT hardcode --server.port — Databricks sets PORT=8000 and the proxy
# routes to that port. Overriding it with 8080 breaks the reverse proxy.

command:
  - streamlit
  - run
  - app.py

# ── The one value you must set ────────────────────────────────────────────────
# Go to: Databricks → SQL Warehouses → [your warehouse] → Connection Details
# Copy the "HTTP Path" field (looks like /sql/1.0/warehouses/abc1234def5678)
# Paste it as the value below, then redeploy.
env:
  - name: SQL_WAREHOUSE_HTTP_PATH
    value: "/sql/1.0/warehouses/YOUR_WAREHOUSE_ID_HERE"
